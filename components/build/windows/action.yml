name: 'Build Windows Binary'
description: 'Compiles the Rust binary for Windows 64-bit 🪟'

inputs:
  binary_name:
    description: 'Name of the resulting binary'
    required: true

runs:
  using: "composite"
  steps:
    - name: Build Binary 🏗️
      shell: bash
      run: cargo build --release --target x86_64-pc-windows-msvc

    - name: Prepare Artifact 📦
      shell: bash
      run: |
        mkdir -p output
        cp target/x86_64-pc-windows-msvc/release/${{ inputs.binary_name }}.exe output/