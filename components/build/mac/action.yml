name: "Build macOS Binary"
description: "Compiles the Rust binary for macOS"

inputs:
  binary_name:
    description: "Name of the resulting binary"
    required: true
  features:
    description: "Features to enable"
    required: false
    default: ""
  target:
    description: "Rust target triple"
    required: false
    default: "aarch64-apple-darwin"
  suffix:
    description: "Suffix for the output file"
    required: false
    default: "-macos-aarch64"

runs:
  using: "composite"
  steps:
    - name: Install Target 🛠️
      shell: bash
      run: rustup target add ${{ inputs.target }}

    - name: Build Binary 🏗️
      shell: bash
      run: |
        if [ -z "${{ inputs.features }}" ]; then
          cargo build --release --target ${{ inputs.target }}
        else
          cargo build --release --target ${{ inputs.target }} --features "${{ inputs.features }}"
        fi

    - name: Prepare Artifact 📦
      shell: bash
      run: |
        mkdir -p output
        cp target/${{ inputs.target }}/release/${{ inputs.binary_name }} output/${{ inputs.binary_name }}${{ inputs.suffix }}
