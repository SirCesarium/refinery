name: 'Build Apple Silicon Binary'
description: 'Compiles the Rust binary for macOS ARM64 🍎'

inputs:
  binary_name:
    description: 'Name of the resulting binary'
    required: true

runs:
  using: "composite"
  steps:
    - name: Install Target 🛠️
      shell: bash
      run: rustup target add aarch64-apple-darwin

    - name: Build Binary 🏗️
      shell: bash
      run: cargo build --release --target aarch64-apple-darwin

    - name: Prepare Artifact 📦
      shell: bash
      run: |
        mkdir -p output
        cp target/aarch64-apple-darwin/release/${{ inputs.binary_name }} output/