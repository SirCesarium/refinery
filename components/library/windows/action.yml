name: "Refinery-RS Windows Library Builder"
description: "Builds and exports Windows dynamic link libraries and static libs"
inputs:
  binary_name:
    description: "The name of the library to build"
    required: true
  target:
    description: "The Rust target triple for the compilation"
    required: true
  output_dir:
    description: "Directory where the libraries will be stored"
    default: "output"
  windows_32bit:
    description: "Build library for Windows x86"
    required: false
    default: "false"
  windows_arm64:
    description: "Build library for Windows ARM64"
    required: false
    default: "false"
runs:
  using: "composite"
  steps:
    - name: Build Multi-Arch Windows Libraries
      shell: bash
      run: |
        TARGETS=("x86_64-pc-windows-msvc")
        if [ "${{ inputs.windows_32bit }}" == "true" ]; then TARGETS+=("i686-pc-windows-msvc"); fi
        if [ "${{ inputs.windows_arm64 }}" == "true" ]; then TARGETS+=("aarch64-pc-windows-msvc"); fi

        for TARGET in "${TARGETS[@]}"; do
          echo "🏗️ Building Windows for $TARGET..."
          rustup target add $TARGET
          
          cargo build --release --target $TARGET

          LIB_DIR="${{ inputs.output_dir }}/lib/$TARGET"
          mkdir -p "$LIB_DIR"

          cp target/$TARGET/release/${{ inputs.binary_name }}.dll "$LIB_DIR/${{ inputs.binary_name }}-$TARGET.dll" 2>/dev/null || echo "DLL not found"
          cp target/$TARGET/release/${{ inputs.binary_name }}.lib "$LIB_DIR/${{ inputs.binary_name }}-$TARGET.lib" 2>/dev/null || echo "LIB not found"
        done
