name: "Refinery-RS Header Generator"
description: "Generates C language headers for cross-language interoperability"
inputs:
  binary_name:
    description: "The name of the library to generate headers for"
    required: true
  output_dir:
    description: "Directory where the .h file will be stored"
    default: "output"
runs:
  using: "composite"
  steps:
    - name: Install cbindgen
      shell: bash
      run: |
        if ! command -v cbindgen &> /dev/null; then
          cargo install cbindgen --quiet
        fi
    - name: Generate C Header
      shell: bash
      run: |
        mkdir -p ${{ inputs.output_dir }}/include
        # Convertimos guiones a guiones bajos para el nombre del archivo .h (estándar C)
        HEADER_NAME=$(echo "${{ inputs.binary_name }}" | tr '-' '_')
        
        cbindgen --config cbindgen.toml --output ${{ inputs.output_dir }}/include/${HEADER_NAME}.h || \
        cbindgen --lang c --output ${{ inputs.output_dir }}/include/${HEADER_NAME}.h