name: "Refinery-RS GHCR Publisher"
description: "Builds and pushes a Docker image to GitHub Container Registry 🏗️🐳"

inputs:
  image_name:
    description: "The name of the image (e.g., my-app)"
    required: true
  github_token:
    description: "GitHub token with packages:write permissions"
    required: true
  dockerfile:
    description: "Path to Dockerfile"
    required: false
    default: "./Dockerfile"

runs:
  using: "composite"
  steps:
    - name: Log in to GHCR 🔑
      shell: bash
      run: echo "${{ inputs.github_token }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

    - name: Build and Push 🚀
      shell: bash
      run: |
        IMAGE_ID=ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}
        IMAGE_ID=$(echo $IMAGE_ID | tr '[A-Z]' '[a-z]')
        VERSION=${{ github.ref_name }}

        echo "Building $IMAGE_ID:$VERSION..."

        docker build -t $IMAGE_ID:$VERSION -f ${{ inputs.dockerfile }} .
        docker tag $IMAGE_ID:$VERSION $IMAGE_ID:latest

        docker push $IMAGE_ID:$VERSION
        docker push $IMAGE_ID:latest
