name: Refinery Smoke Test

on:
  workflow_call:
    inputs:
      refinery_bin:
        description: 'Path to refinery binary'
        type: string
        required: true
      filter:
        description: 'OS filter'
        type: string
        required: false
        default: ""

jobs:
  smoke-test:
    name: Smoke Test (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: ubuntu-latest
            artifact_os: linux
            artifact_arch: x86_64
            refinery_bin: ./refinery-linux-x86_64
            filter: "linux wasi"
          - os: windows
            runner: windows-latest
            artifact_os: windows
            artifact_arch: x86_64
            refinery_bin: ./refinery-windows-x86_64.exe
            filter: "windows"
          - os: darwin
            runner: macos-latest
            artifact_os: darwin
            artifact_arch: aarch64
            refinery_bin: ./refinery-darwin-aarch64
            filter: "darwin"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download Refinery
        uses: actions/download-artifact@v8
        with:
          name: refinery-${{ matrix.artifact_os }}-${{ matrix.artifact_arch }}
          path: .

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu, x86_64-unknown-linux-musl, i686-unknown-linux-gnu, aarch64-unknown-linux-gnu, wasm32-wasip1, x86_64-pc-windows-msvc, i686-pc-windows-msvc, x86_64-pc-windows-gnu, aarch64-apple-darwin

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "stable"

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: tests/smoke/rust-project -> target

      - name: Install Rust tools (Linux)
        if: matrix.os == 'linux'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deb,cargo-generate-rpm

      - name: Install dependencies (Linux)
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static gcc-aarch64-linux-gnu gcc-i686-linux-gnu libc6-dev-i386 musl-tools
          curl https://wasmtime.dev/install.sh -sSf | bash
          echo "$HOME/.wasmtime/bin" >> $GITHUB_PATH
        shell: bash

      - name: Run Smoke Test
        shell: bash
        run: |
          chmod +x scripts/smoke-test.sh
          [ "${{ matrix.os }}" != "windows" ] && chmod +x ${{ matrix.refinery_bin }}
          ./scripts/smoke-test.sh ${{ matrix.refinery_bin }} "${{ matrix.filter }}"
