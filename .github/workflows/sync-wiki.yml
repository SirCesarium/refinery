name: Sync Wiki

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repository
        uses: actions/checkout@v6

      - name: Setup Git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync docs to Wiki
        env:
          WIKI_REPO: "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git"
        run: |
          git clone "$WIKI_REPO" wiki_repo || {
            echo "Wiki repo not found or not initialized. Skipping sync."
            exit 0
          }
          
          # Clean existing files (preserves .git)
          rm -rf wiki_repo/*
          
          # Copy everything from docs/
          cp -rv docs/* wiki_repo/
          
          cd wiki_repo
          
          # Robust case-insensitive rename of README.md to Home.md
          README_FILE=$(find . -maxdepth 1 -iname "readme.md" -print -quit)
          if [ -n "$README_FILE" ]; then
            echo "Found main page at $README_FILE, renaming to Home.md"
            mv "$README_FILE" Home.md
          fi
          
          if [[ -n "$(git status --porcelain)" ]]; then
            git add .
            git commit -m "docs: auto-sync from main branch (docs/)"
            git push origin master || git push origin main
          else
            echo "No changes to sync."
          fi
