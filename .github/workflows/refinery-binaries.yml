name: Build and Release Refinery

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }}-${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: linux
            arch: x86_64
            runner: ubuntu-latest
          - os: windows
            arch: x86_64
            runner: windows-latest
          - os: darwin
            arch: aarch64
            runner: macos-latest
          - os: linux
            arch: aarch64
            runner: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "stable"

      - name: Build Binary
        shell: bash
        run: |
          BINARY_NAME="refinery-${{ matrix.os }}-${{ matrix.arch }}"
          if [ "${{ matrix.os }}" = "windows" ]; then
            BINARY_NAME="${BINARY_NAME}.exe"
          fi
          go build -o "${BINARY_NAME}" ./cmd/refinery/main.go

      - name: Test Binary
        shell: bash
        run: |
          BINARY_NAME="refinery-${{ matrix.os }}-${{ matrix.arch }}"
          if [ "${{ matrix.os }}" = "windows" ]; then
            BINARY_NAME="${BINARY_NAME}.exe"
          fi
          ./"${BINARY_NAME}" --help

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: refinery-${{ matrix.os }}-${{ matrix.arch }}
          path: refinery-*
          if-no-files-found: error
          compression-level: 0

  smoke-test:
    name: Smoke Test (${{ matrix.os }})
    needs: build
    runs-on: ${{ matrix.runner }}
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: ubuntu-latest
            artifact_os: linux
            artifact_arch: x86_64
            refinery_bin: ./refinery-linux-x86_64
            filter: "linux wasi"
          - os: windows
            runner: windows-latest
            artifact_os: windows
            artifact_arch: x86_64
            refinery_bin: ./refinery-windows-x86_64.exe
            filter: "windows"
          - os: darwin
            runner: macos-latest
            artifact_os: darwin
            artifact_arch: aarch64
            refinery_bin: ./refinery-darwin-aarch64
            filter: "darwin"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download Refinery
        uses: actions/download-artifact@v8
        with:
          name: refinery-${{ matrix.artifact_os }}-${{ matrix.artifact_arch }}
          path: .

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu, x86_64-unknown-linux-musl, i686-unknown-linux-gnu, aarch64-unknown-linux-gnu, x86_64-pc-windows-msvc, i686-pc-windows-msvc, x86_64-pc-windows-gnu, aarch64-apple-darwin, wasm32-wasip1

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: tests/smoke/rust-project -> target

      - name: Install Rust tools (Linux)
        if: matrix.os == 'linux'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deb,cargo-generate-rpm

      - name: Install dependencies (Linux)
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static gcc-aarch64-linux-gnu gcc-i686-linux-gnu libc6-dev-i386 musl-tools
          curl https://wasmtime.dev/install.sh -sSf | bash
          echo "$HOME/.wasmtime/bin" >> $GITHUB_PATH

      - name: Run Smoke Test
        shell: bash
        run: |
          chmod +x scripts/smoke-test.sh
          [ "${{ matrix.os }}" != "windows" ] && chmod +x ${{ matrix.refinery_bin }}
          ./scripts/smoke-test.sh ${{ matrix.refinery_bin }} "${{ matrix.filter }}"

  release:
    name: Create Release
    needs: [build, smoke-test]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./artifacts
          merge-multiple: false

      - name: List Artifacts
        run: find ./artifacts -type f | sort

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          files: ./artifacts/**/*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
