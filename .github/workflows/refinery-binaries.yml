name: Build Refinery Binaries

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }}-${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest
          - os: windows
            arch: amd64
            runner: windows-latest
          - os: darwin
            arch: arm64
            runner: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
      - name: Build
        shell: bash
        run: |
          go build -o refinery${{ matrix.os == 'windows' && '.exe' || '' }} ./cmd/refinery/main.go
      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: refinery-${{ matrix.os }}-${{ matrix.arch }}
          path: refinery*

  smoke-test:
    name: Smoke Test (${{ matrix.os }})
    needs: build
    runs-on: ${{ matrix.runner }}
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: ubuntu-latest
            artifact_os: linux
            artifact_arch: amd64
            refinery_bin: ./refinery
            filter: "linux wasi"
          - os: windows
            runner: windows-latest
            artifact_os: windows
            artifact_arch: amd64
            refinery_bin: ./refinery.exe
            filter: "windows"

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Download Refinery
        uses: actions/download-artifact@v8
        with:
          name: refinery-${{ matrix.artifact_os }}-${{ matrix.artifact_arch }}
          path: .
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: tests/smoke/rust-project -> target
      - name: Install dependencies (Linux)
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static gcc-aarch64-linux-gnu gcc-i686-linux-gnu libc6-dev-i386 musl-tools
          curl https://wasmtime.dev/install.sh -sSf | bash
          echo "$HOME/.wasmtime/bin" >> $GITHUB_PATH
      - name: Run Smoke Test
        shell: bash
        run: |
          chmod +x scripts/smoke-test.sh
          [ "${{ matrix.os }}" != "windows" ] && chmod +x ${{ matrix.refinery_bin }}
          ./scripts/smoke-test.sh ${{ matrix.refinery_bin }} "${{ matrix.filter }}"

  release:
    name: Create Release
    needs: [build, smoke-test]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./artifacts
          merge-multiple: true
      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          files: ./artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
