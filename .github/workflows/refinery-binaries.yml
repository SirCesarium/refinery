name: Build Refinery Binaries

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }}-${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest
          - os: windows
            arch: amd64
            runner: windows-latest
          - os: darwin
            arch: arm64
            runner: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
      - name: Build
        shell: bash
        run: |
          go build -o refinery${{ matrix.os == 'windows' && '.exe' || '' }} ./cmd/refinery/main.go
      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: refinery-${{ matrix.os }}-${{ matrix.arch }}
          path: refinery*

  smoke-test:
    name: Smoke Test (${{ matrix.os }})
    needs: build
    runs-on: ${{ matrix.runner }}
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: ubuntu-latest
            artifact_os: linux
            artifact_arch: amd64
            refinery_bin: ../../../refinery
          - os: windows
            runner: windows-latest
            artifact_os: windows
            artifact_arch: amd64
            refinery_bin: ../../../refinery.exe
          - os: darwin
            runner: macos-latest
            artifact_os: darwin
            artifact_arch: arm64
            refinery_bin: ../../../refinery

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Download Refinery
        uses: actions/download-artifact@v8
        with:
          name: refinery-${{ matrix.artifact_os }}-${{ matrix.artifact_arch }}
          path: .
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies (Linux)
        if: matrix.os == 'linux'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deb,cargo-generate-rpm
      - name: Run Smoke Test
        shell: bash
        run: |
          if [ "${{ matrix.os }}" != "windows" ]; then
            chmod +x ${{ matrix.refinery_bin }}
          fi
          cd tests/smoke/rust-project
          cp ../../../LICENSE .
          
          echo "Testing $RUNNER_OS build..."
          ${{ matrix.refinery_bin }} build --artifact smoke-bin --os ${{ matrix.artifact_os }} --arch x86_64
          ${{ matrix.refinery_bin }} build --artifact smoke-lib --os ${{ matrix.artifact_os }} --arch x86_64
          
          echo "Verifying execution..."
          if [ "${{ matrix.os }}" == "windows" ]; then
            ./dist/smoke-bin-windows-x86_64.exe | grep "Refinery Smoke Test: Success"
          else
            ./dist/smoke-bin-${{ matrix.artifact_os }}-x86_64* | grep "Refinery Smoke Test: Success"
          fi
          
          echo "Verifying headers..."
          grep "smoke_test_fn" dist/smoke-test.h

  release:
    name: Create Release
    needs: [build, smoke-test]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./artifacts
          merge-multiple: true
      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          files: ./artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
