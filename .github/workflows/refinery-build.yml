name: Refinery Build
"on":
    push:
        tags:
            - v*
    release:
        types:
            - created
permissions:
    contents: write
    packages: write
jobs:
    build:
        name: Build ${{ matrix.artifact }} (${{ matrix.os }}-${{ matrix.arch }})
        runs-on: ${{ matrix.runs_on }}
        strategy:
            fail-fast: true
            matrix:
                include:
                    - arch: amd64
                      artifact: refinery
                      os: darwin
                      runs_on: macos-latest
                    - arch: arm64
                      artifact: refinery
                      os: darwin
                      runs_on: macos-latest
                    - arch: amd64
                      artifact: refinery
                      os: windows
                      runs_on: windows-latest
                    - arch: "386"
                      artifact: refinery
                      os: windows
                      runs_on: windows-latest
                    - arch: amd64
                      artifact: refinery
                      os: linux
                      runs_on: ubuntu-latest
                    - arch: arm64
                      artifact: refinery
                      os: linux
                      runs_on: ubuntu-latest
                    - arch: "386"
                      artifact: refinery
                      os: linux
                      runs_on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6
            - name: Setup Go
              uses: actions/setup-go@v6
              with:
                cache: true
                go-version: 1.26.2
            - name: Build Refinery from Source
              run: go build -o ./refinery-local ./cmd/refinery
            - name: 'Pre-Build: smoke-test'
              uses: ./.github/actions/smoke-test
              with:
                filter: ${{ matrix.os }}
                refinery_bin: ./refinery-local
            - name: Build Artifact using Local Refinery
              run: ./refinery-local build --artifact ${{ matrix.artifact }} --os ${{ matrix.os }} --arch ${{ matrix.arch }}${{ matrix.abi != '' && format(' --abi {0}', matrix.abi) || '' }}
            - name: 'Post-Build: upload-artifacts'
              uses: ./.github/actions/upload-artifacts
              with:
                name: bin-${{ matrix.artifact }}-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.abi && format('-{0}', matrix.abi) }}
                path: dist
    release:
        name: Release Artifacts
        runs-on: ubuntu-latest
        needs:
            - build
        if: startsWith(github.ref, 'refs/tags/')
        steps:
            - name: Download Artifacts
              uses: actions/download-artifact@v8
              with:
                merge-multiple: false
                path: ./artifacts
            - name: List Artifacts
              run: find ./artifacts -type f | sort
            - name: Publish Release
              uses: softprops/action-gh-release@v3
              with:
                fail_on_unmatched_files: true
                files: ./artifacts/**/*
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
