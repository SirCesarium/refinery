name: Refinery Build
"on":
    push:
        tags:
            - v*
    release:
        types:
            - created
permissions:
    contents: write
    packages: write
jobs:
    build:
        name: Build ${{ matrix.artifact }} (${{ matrix.os }}-${{ matrix.arch }})
        runs-on: ${{ matrix.runs_on }}
        needs:
            - setup
        strategy:
            fail-fast: true
            matrix:
                include:
                    - arch: amd64
                      artifact: refinery
                      os: linux
                      runs_on: ubuntu-latest
                    - arch: arm64
                      artifact: refinery
                      os: linux
                      runs_on: ubuntu-latest
                    - arch: "386"
                      artifact: refinery
                      os: linux
                      runs_on: ubuntu-latest
                    - arch: amd64
                      artifact: refinery
                      os: windows
                      runs_on: windows-latest
                    - arch: "386"
                      artifact: refinery
                      os: windows
                      runs_on: windows-latest
                    - arch: amd64
                      artifact: refinery
                      os: darwin
                      runs_on: macos-latest
                    - arch: arm64
                      artifact: refinery
                      os: darwin
                      runs_on: macos-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6
            - name: Download Local Refinery
              uses: actions/download-artifact@v8
              with:
                name: refinery-local
                path: .
            - name: Prepare Local Refinery
              run: chmod +x ./refinery-local
            - name: Build Artifact using Local Refinery
              run: ./refinery-local build --artifact ${{ matrix.artifact }} --os ${{ matrix.os }} --arch ${{ matrix.arch }}${{ matrix.abi != '' && format(' --abi {0}', matrix.abi) || '' }}
            - name: Internal Upload for Teardown
              uses: actions/upload-artifact@v7
              with:
                name: dist-${{ strategy.job-index }}
                path: dist
                retention-days: 1
    release:
        name: Release Artifacts
        runs-on: ubuntu-latest
        needs:
            - build
            - teardown
        if: startsWith(github.ref, 'refs/tags/')
        steps:
            - name: Download Artifacts
              uses: actions/download-artifact@v8
              with:
                merge-multiple: true
                path: ./artifacts
            - name: List Artifacts
              run: find ./artifacts -type f | sort
            - name: Publish Release
              uses: softprops/action-gh-release@v3
              with:
                fail_on_unmatched_files: true
                files: ./artifacts/**/*
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    setup:
        name: Setup and Global Checks
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6
            - name: Setup Go
              uses: actions/setup-go@v6
              with:
                cache: true
                go-version: 1.26.2
            - name: Build Refinery from Source
              run: go build -o ./refinery-local ./cmd/refinery
            - name: 'Pre-Build (Global): smoke-test'
              uses: ./.github/actions/smoke-test
              with:
                refinery_bin: ./refinery-local
            - name: Upload Local Refinery
              uses: actions/upload-artifact@v7
              with:
                name: refinery-local
                path: ./refinery-local
                retention-days: 1
    teardown:
        name: Global Post-Build Tasks
        runs-on: ubuntu-latest
        needs:
            - build
        steps:
            - name: Checkout
              uses: actions/checkout@v6
            - name: Download All Artifacts
              uses: actions/download-artifact@v8
              with:
                merge-multiple: true
                path: ./artifacts
            - name: 'Post-Build (Global): upload-artifacts'
              uses: ./.github/actions/upload-artifacts
              with:
                name: all-platforms-binaries
                path: artifacts
