name: Refinery Pipeline
"on":
  push:
    tags:
    - v*
  workflow_dispatch: null
permissions:
  contents: write
  pull-requests: write
jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
        - use_cross: "false"
          os: ubuntu-latest
          tool: zigbuild
          target: x86_64-unknown-linux-gnu
        - use_cross: "true"
          target: aarch64-unknown-linux-gnu
          os: ubuntu-latest
          tool: zigbuild
        - os: ubuntu-latest
          use_cross: "true"
          target: x86_64-unknown-linux-musl
        - use_cross: "true"
          os: ubuntu-latest
          target: aarch64-unknown-linux-musl
        - os: macos-latest
          target: aarch64-apple-darwin
          use_cross: "false"
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Rust Toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}
    - name: Rust Cache
      uses: Swatinem/rust-cache@v2
    - name: Install Packagers
      run: |-
        if [ "${{ runner.os }}" = "Windows" ]; then
          cargo install cargo-wix
        else
          cargo install cargo-deb cargo-generate-rpm
        fi
      shell: bash
    - name: Install Refinery
      run: >-
        cargo install --git https://github.com/SirCesarium/refinery-rs
        --no-default-features
      shell: bash
    - name: Install Cross
      run: >-
        curl -L
        https://github.com/cross-rs/cross/releases/latest/download/cross-x86_64-unknown-linux-musl.tar.gz | tar xz -C /usr/local/bin
      if: >-
        ${{ matrix.tool == 'cross' || (matrix.use_cross == 'true' && matrix.tool == '')
        }}
      shell: bash
    - name: Install Zig and cargo-zigbuild
      run: sudo snap install zig --classic --beta && cargo install cargo-zigbuild
      if: ${{ matrix.tool == 'zigbuild' }}
      shell: bash
    - name: Build
      run: |-
        if [ -n "${{ matrix.cross_image }}" ]; then
          export CROSS_IMAGE="${{ matrix.cross_image }}"
        fi
        refinery build --target ${{ matrix.target }} --release
      shell: bash
    - name: "Prepare Artifacts: refinery"
      run: |-
        mkdir -p dist
        if [ "${{ runner.os }}" = "Windows" ]; then
          find target -name "refinery.exe" -path "*/release/*" -exec cp {} dist/refinery-${{ matrix.target }}.exe \; 2>/dev/null || true
          find target -name "*.msi" -exec cp {} dist/ \; 2>/dev/null || true
          find target -name "*.zip" -exec cp {} dist/ \; 2>/dev/null || true
        else
          find target -name "refinery" -path "*/release/*" -not -name "*.d" -exec cp {} dist/refinery-${{ matrix.target }} \; 2>/dev/null || true
          find target -name "*.deb" -exec cp {} dist/ \; 2>/dev/null || true
          find target -name "*.rpm" -exec cp {} dist/ \; 2>/dev/null || true
          find target -name "*.tar.gz" -exec cp {} dist/ \; 2>/dev/null || true
        fi
        ls -R dist/
      shell: bash
    - name: "Prepare Artifacts: refinery-build"
      run: |-
        mkdir -p dist
        if [ "${{ runner.os }}" = "Windows" ]; then
          find target -name "refinery-build.exe" -path "*/release/*" -exec cp {} dist/refinery-build-${{ matrix.target }}.exe \; 2>/dev/null || true
          find target -name "*.msi" -exec cp {} dist/ \; 2>/dev/null || true
          find target -name "*.zip" -exec cp {} dist/ \; 2>/dev/null || true
        else
          find target -name "refinery-build" -path "*/release/*" -not -name "*.d" -exec cp {} dist/refinery-build-${{ matrix.target }} \; 2>/dev/null || true
          find target -name "*.deb" -exec cp {} dist/ \; 2>/dev/null || true
          find target -name "*.rpm" -exec cp {} dist/ \; 2>/dev/null || true
          find target -name "*.tar.gz" -exec cp {} dist/ \; 2>/dev/null || true
        fi
        ls -R dist/
      shell: bash
    - name: Upload Artifacts
      uses: actions/upload-artifact@v7
      with:
        path: dist/*
        name: artifact-${{ matrix.target }}
        if-no-files-found: error
  release:
    name: Release Artifacts
    runs-on: ubuntu-latest
    needs:
    - build
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Download all artifacts
      uses: actions/download-artifact@v8
      with:
        merge-multiple: "true"
        path: artifacts
    - name: Publish Release
      uses: softprops/action-gh-release@v3
      with:
        files: artifacts/*
