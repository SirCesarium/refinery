refinery_version = "latest"

[project]
name = "smoke-test"
lang = "rust"

[naming]
binary = "{artifact}-{os}-{arch}{abi}"
package = "{artifact}-{version}-{os}-{arch}{abi}.{ext}"

[artifacts.smoke-bin]
type = "bin"
source = "smoke-bin"
packages = ["tar.gz", "deb", "rpm", "msi"]

[artifacts.smoke-bin.targets.linux]
os = "linux"
archs = ["x86_64", "i686", "aarch64"]
abis = ["gnu", "musl"]

[artifacts.smoke-bin.targets.darwin]
os = "darwin"
archs = ["x86_64", "aarch64"]

[artifacts.smoke-bin.targets.windows]
os = "windows"
archs = ["x86_64", "i686", "aarch64"]
abis = ["gnu", "msvc"]

[artifacts.smoke-bin.targets.wasi]
os = "wasi"
archs = ["wasm32"]

[artifacts.smoke-lib]
type = "lib"
source = "smoke-lib"
library_types = ["cdylib", "staticlib"]
packages = ["zip"]
headers = true

[artifacts.smoke-lib.targets.linux]
os = "linux"
archs = ["x86_64", "i686", "aarch64"]
abis = ["gnu", "musl"]

[artifacts.smoke-lib.targets.darwin]
os = "darwin"
archs = ["x86_64", "aarch64"]

[artifacts.smoke-lib.targets.windows]
os = "windows"
archs = ["x86_64", "i686", "aarch64"]
abis = ["gnu", "msvc"]

[artifacts.smoke-lib.targets.wasi]
os = "wasi"
archs = ["wasm32"]
